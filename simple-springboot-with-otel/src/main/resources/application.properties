server.port=8080
spring.application.name=dash0-java-demo

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Downstream service URLs.
# Use Kubernetes service names so that the service works in any pod, on any node.
# Override locally with environment variables:
#   SERVICES_PAYMENT_URL=http://localhost:8083
#   SERVICES_INVENTORY_URL=http://localhost:8082
services.payment.url=http://payment-service:8083
services.inventory.url=http://inventory-service:8082

# RestTemplate connection / read timeouts (milliseconds)
services.http.connect-timeout-ms=2000
services.http.read-timeout-ms=5000

# JVM flag required for complete OpenTelemetry exception stacktraces.
# -XX:-OmitStackTraceInFastThrow prevents the JVM from dropping stack frames
# from frequently-thrown exceptions (e.g. NullPointerException).  Without it,
# the exception.stacktrace span attribute produced by span.recordException()
# contains only the exception class name and no frames, making root-cause
# analysis impossible in Dash0.
#
# Add this flag to JAVA_TOOL_OPTIONS in your run script or container spec:
#   export JAVA_TOOL_OPTIONS="-XX:-OmitStackTraceInFastThrow -javaagent:opentelemetry-javaagent.jar"
#
# See .mvn/jvm.config for the equivalent setting applied to ./mvnw builds.
